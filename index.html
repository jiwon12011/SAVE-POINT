<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>달빛 조제실</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preload" as="image" href="assets/backgrounds/bg-workshop-alchemy.webp" />
</head>
<body>
  <!-- viewport = 무대 + 도감이 가로로 늘어선 트랙. 도감 진입 시 translateX. -->
  <div class="viewport" id="viewport">
    <div class="track" id="track">

      <!-- ============ 무대(조제대) ============ -->
      <main class="stage" id="stage" aria-label="조제대 무대">
        <!-- 배경 그림 위에 히트존만 얹는다 -->
        <div class="stage-bg" aria-hidden="true"></div>

        <!-- 앰비언트: 가마 김 + 반딧불 (저강도 — "오 게임이네" 첫인상) -->
        <div class="ambient" aria-hidden="true">
          <span class="steam s1"></span><span class="steam s2"></span><span class="steam s3"></span>
          <span class="firefly f1"></span><span class="firefly f2"></span>
        </div>

        <!-- 상단 HUD: 별사탕 + 도감 진행 (얇은 글래스 바) -->
        <header class="hud" id="hud">
          <div class="hud-item star">
            <img src="assets/icon-star-candy.png" alt="별사탕" class="hud-icon" />
            <span id="starCount">0</span>
          </div>
          <div class="hud-item dayProg">
            <span class="hud-label">손님</span>
            <span id="custProg">0</span><span class="hud-dim">/0</span>
          </div>
          <div class="hud-item codexProg">
            <span class="hud-label">도감</span>
            <span id="codexCount">0</span><span class="hud-dim" id="codexTotal">/3</span>
          </div>
        </header>

        <!-- 결정 손님: 아치창에 떠서 발광 + 말풍선 -->
        <section class="customer" id="customer" aria-label="결정 손님">
          <div class="speech" id="speech">
            <span id="speechText">…</span>
            <span class="speech-mod" id="speechMod"></span>
          </div>
          <img src="assets/ailment-sleep.png" alt="졸린 달" class="customer-sprite" id="customerSprite" />
        </section>

        <!-- 가마(주인공): 글래스 드롭존, 액체색 = --liquid -->
        <section class="cauldron" id="cauldron" aria-label="가마">
          <div class="cauldron-glow" id="cauldronGlow" aria-hidden="true"></div>
          <div class="cauldron-liquid" id="cauldronLiquid" aria-hidden="true"></div>
          <div class="cauldron-ripple" id="cauldronRipple" aria-hidden="true"></div>
          <div class="cauldron-hint" id="cauldronHint">가루를 넣어요</div>
        </section>

        <!-- 절구: 가마 상판에 겹쳐 띄움(독립 높이 0). 약초 올리고 길게눌러 빻기 -->
        <section class="mortar" id="mortar" aria-label="절구">
          <div class="mortar-ring" id="mortarRing" aria-hidden="true"></div>
          <div class="mortar-bowl" id="mortarBowl">
            <img class="mortar-herb" id="mortarHerb" alt="" hidden />
            <div class="grind-gauge" id="grindGauge" aria-hidden="true"></div>
          </div>
          <div class="mortar-hint" id="mortarHint">약초를 올려요</div>
        </section>

        <!-- 봉인 병(색 무르익으면 활성) -->
        <button class="bottle" id="bottle" aria-label="병으로 봉인" disabled>
          <span class="bottle-cap" aria-hidden="true"></span>
          <span class="bottle-label">봉인</span>
        </button>

        <!-- 다음 행동 안내: 제스처 흐름 칩(현재 단계 강조) — "뭘 해야 하지" 제거 -->
        <div class="gesture-flow" id="gestureFlow" aria-hidden="true">
          <span class="gf-step" data-step="grind">절구</span>
          <span class="gf-arrow">→</span>
          <span class="gf-step" data-step="pour">가마</span>
          <span class="gf-arrow">→</span>
          <span class="gf-step" data-step="seal">봉인</span>
        </div>

        <!-- 약초 서랍(하단): 56×72 칩, 드래그 소스 -->
        <footer class="drawer" id="drawer" aria-label="약초 서랍"></footer>

        <!-- 도감 진입: 하단 모서리 책 오브젝트(디제틱) -->
        <button class="codex-book" id="codexBook" aria-label="도감 열기">
          <span class="book-spine" aria-hidden="true"></span>
        </button>
      </main>

      <!-- ============ 도감 패널(밀어내는 슬라이드, 모달 아님) ============ -->
      <aside class="codex-panel" id="codexPanel" aria-label="도감">
        <div class="codex-bg" aria-hidden="true"></div>
        <div class="codex-head">
          <button class="codex-close" id="codexClose" aria-label="도감 닫기">‹ 닫기</button>
          <h2 class="codex-title">잠든 정령들의 선반</h2>
        </div>
        <div class="codex-shelf" id="codexShelf"></div>
      </aside>
    </div>
  </div>

  <!-- 드래그 고스트(고정 루트 — setPointerCapture는 여기에) -->
  <div class="drag-ghost" id="dragGhost" aria-hidden="true"></div>

  <!-- 파티클 레이어(가마/빻기/치유) -->
  <canvas class="fx-canvas" id="fxCanvas" aria-hidden="true"></canvas>

  <!-- 봉인 payoff 플래시 -->
  <div class="seal-flash" id="sealFlash" aria-hidden="true"></div>

  <!-- 마감 시트(불 끄기) — 무압박 정산. 풀스크린 1컷. 빨간 경고 금지. -->
  <div class="closing-sheet" id="closingSheet" aria-hidden="true">
    <div class="cs-inner">
      <div class="cs-flame" aria-hidden="true">🕯️</div>
      <h2 class="cs-title">오늘의 불을 끕니다</h2>
      <p class="cs-sub" id="csSub">정령들을 모두 재웠어요.</p>
      <div class="cs-stats">
        <div class="cs-row"><span class="cs-k">재운 정령</span><span class="cs-v" id="csHealed">0</span></div>
        <div class="cs-row"><span class="cs-k">오늘 별사탕</span><span class="cs-v" id="csStars">★ 0</span></div>
        <div class="cs-row"><span class="cs-k">연속일</span><span class="cs-v" id="csStreak">1일</span></div>
      </div>
      <p class="cs-preview" id="csPreview">내일은 또 누가 찾아올까요…</p>
      <button class="cs-close" id="csClose">잘 자요</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
